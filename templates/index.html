<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نظام الدردشة التفاعلي للمناهج والتسجيل</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body { background:#f5f7fb; }
    .chat-card {
      max-width: 900px;
      margin: 30px auto;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      background:white;
    }
    .chat-header {
      border-bottom:1px solid #e5e5e5;
      padding:16px 20px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .chat-header img.logo {
      width:54px; height:54px;
      border-radius:50%;
      background:white;
      object-fit:contain;
    }
    .chat-header .title {
      font-weight:700;
      font-size:1rem;
    }
    .chat-body {
      max-height:500px;
      overflow-y:auto;
      padding:16px;
    }
    .msg-row { margin-bottom:12px; display:flex; }
    .msg-row.user { justify-content:flex-end; }
    .bubble {
      border-radius:18px;
      padding:10px 14px;
      max-width:75%;
      font-size:0.95rem;
      line-height:1.5;
    }
    .bubble.user {
      background:#2563eb;
      color:white;
      border-bottom-right-radius:4px;
    }
    .bubble.bot {
      background:#f1f5f9;
      border-bottom-left-radius:4px;
    }
    .bot-avatar {
      width:36px; height:36px;
      border-radius:50%;
      margin-left:8px;
      object-fit:cover;
    }
    .input-area {
      border-top:1px solid #e5e5e5;
      padding:10px 16px;
    }
    .input-area textarea {
      resize:none;
      max-height:120px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="chat-card">
    <div class="chat-header">
      <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="شعار الكلية">
      <div>
        <div class="title">نظام الدردشة التفاعلي للإجابة على الأسئلة الشائعة حول المناهج الجامعية والتسجيل</div>
        <div class="text-muted small">Imam Al-Kadhum College – FAQ Chatbot</div>
      </div>
    </div>

    <div id="chat-body" class="chat-body">
      <div class="msg-row bot">
        <img src="{{ url_for('static', filename='bot.png') }}" class="bot-avatar" alt="Bot">
        <div class="bubble bot">
          أهلاً بك 👋، يمكنك طرح أي سؤال يتعلق بقسم التسجيل
        </div>
      </div>
    </div>

    <div class="input-area">
      <form id="chat-form" class="d-flex gap-2">
        <textarea id="message-input" class="form-control" rows="1"
                  placeholder="اكتب سؤالك هنا ثم اضغط Enter للإرسال..."></textarea>
        <button class="btn btn-primary" type="submit">إرسال</button>
      </form>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');
  const body = document.getElementById('chat-body');

  function appendMessage(text, sender, suggestions) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + sender;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + sender;
    bubble.textContent = text;
    if (sender === 'bot') {
      const img = document.createElement('img');
      img.className = 'bot-avatar';
      img.src = '{{ url_for("static", filename="bot.png") }}';
      row.appendChild(img);
    }
    row.appendChild(bubble);
    body.appendChild(row);

    if (suggestions && suggestions.length) {
      const srow = document.createElement('div');
      srow.className = 'msg-row bot';
      const img = document.createElement('img');
      img.className = 'bot-avatar';
      img.src = '{{ url_for("static", filename="bot.png") }}';
      srow.appendChild(img);
      const sb = document.createElement('div');
      sb.className = 'bubble bot';
      sb.innerHTML = 'اقتراحات:<br>';
      suggestions.forEach(q => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-outline-primary mt-1 me-1';
        btn.textContent = q;
        btn.onclick = () => sendMessage(q, true);
        sb.appendChild(btn);
      });
      srow.appendChild(sb);
      body.appendChild(srow);
    }

    body.scrollTop = body.scrollHeight;
  }

  async function sendMessage(text, fromSuggestion=false) {
    if (!text.trim()) return;
    appendMessage(text, 'user');
    input.value = '';

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, from_suggestion: fromSuggestion})
    });
    const data = await res.json();
    appendMessage(data.reply, 'bot', data.suggestions || []);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage(input.value, false);
  });

  // إرسال بالسطر Enter
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
